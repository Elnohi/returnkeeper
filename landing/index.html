<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ReturnKeeper · Never miss a return deadline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 32px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .tagline {
      font-size: 20px;
      color: #666;
      margin-bottom: 32px;
    }

    .feature-list {
      text-align: left;
      margin: 32px 0;
      padding: 0 16px;
    }

    .feature-list li {
      margin: 12px 0;
      font-size: 16px;
      color: #333;
      list-style: none;
      padding-left: 28px;
      position: relative;
    }

    .feature-list li:before {
      content: "✅";
      position: absolute;
      left: 0;
    }

    .email-input {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 48px;
      margin-bottom: 12px;
      outline: none;
      transition: border 0.2s;
    }

    .email-input:focus {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #667eea;
      color: white;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 48px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #5a67d8;
    }

    .message {
      margin-top: 12px;
      padding: 12px;
      border-radius: 48px;
      font-size: 14px;
    }

    .message.success {
      background: #48bb78;
      color: white;
    }

    .message.error {
      background: #e53e3e;
      color: white;
    }

    .counter {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      margin-top: 24px;
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }

    .github-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📸 ReturnKeeper</h1>
    <div class="tagline">Never miss a return deadline again.</div>

    <ul class="feature-list">
      <li>Snap any receipt</li>
      <li>Auto-detects return deadline</li>
      <li>Alerts you 3 days before</li>
      <li>Tracks warranties too</li>
    </ul>

    <input type="email" id="email" class="email-input" placeholder="Enter your email" required>
    <button id="waitlistBtn">Get early access →</button>
    <div id="message"></div>
    <div class="counter" id="counter">🚀 Loading waitlist count...</div>
    <div class="footer">iOS + Android · Free for 20 receipts/month</div>
    <a href="https://github.com/YOUR_USERNAME/returnkeeper" class="github-link" target="_blank">⭐ Star on GitHub</a>
  </div>

  <script>
    let waitlistCount = parseInt(localStorage.getItem('returnkeeper_count')) || 147;
    document.getElementById('counter').innerHTML = `🚀 ${waitlistCount} people already waiting`;

    document.getElementById('waitlistBtn').addEventListener('click', function() {
      const email = document.getElementById('email').value;
      const messageDiv = document.getElementById('message');

      if (!email || !email.includes('@')) {
        messageDiv.innerHTML = '<div class="message error">Please enter a valid email address</div>';
        setTimeout(() => messageDiv.innerHTML = '', 2000);
        return;
      }

      waitlistCount++;
      localStorage.setItem('returnkeeper_count', waitlistCount);
      document.getElementById('counter').innerHTML = `🚀 ${waitlistCount} people already waiting`;

      let emails = JSON.parse(localStorage.getItem('returnkeeper_emails')) || [];
      if (!emails.includes(email)) {
        emails.push(email);
        localStorage.setItem('returnkeeper_emails', JSON.stringify(emails));
      }

      messageDiv.innerHTML = '<div class="message success">🎉 You\'re on the list! We\'ll notify you at launch.</div>';
      document.getElementById('email').value = '';

      setTimeout(() => messageDiv.innerHTML = '', 3000);

      console.log('Waitlist emails:', emails);
    });
  </script>
</body>
</html>
